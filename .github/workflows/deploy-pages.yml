name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish Blazor WASM
        env:
          NUGET_CREDENTIALPROVIDER_SESSIONTOKENCACHE_ENABLED: true
          VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: ""
        run: |
          dotnet nuget add source https://nuget.telerik.com/v3/index.json \
            --name TelerikOnlineFeed \
            --username "${{ secrets.TELERIK_USERNAME }}" \
            --password "${{ secrets.TELERIK_PASSWORD }}" \
            --store-password-in-clear-text
          dotnet publish src/OutlookInspiredApp.Blazor.csproj \
            -c Release \
            -o publish

      - name: Fix base href for GitHub Pages sub-path
        run: |
          sed -i 's|<base href="/" />|<base href="/wpf-to-blazor/" />|g' \
            publish/wwwroot/index.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404.html for SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
